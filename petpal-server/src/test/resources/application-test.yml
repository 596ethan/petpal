spring:
  datasource:
    url: jdbc:h2:mem:petpal;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/seed.sql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  data:
    redis:
      host: localhost
      port: 6379

petpal:
  admin:
    token: test-admin-token
  jwt:
    issuer: petpal-test
    secret: petpal-phone-mvp-secret-key-please-change
    access-expire-seconds: 7200
    refresh-expire-seconds: 604800
