server:
  port: ${PETPAL_SERVER_PORT:18080}

spring:
  application:
    name: petpal-server
  datasource:
    url: jdbc:mysql://localhost:3307/petpal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  data:
    redis:
      host: localhost
      port: 6379

petpal:
  admin:
    token: petpal-admin-token-change-me
  jwt:
    issuer: petpal
    secret: petpal-phone-mvp-secret-key-please-change
    access-expire-seconds: 7200
    refresh-expire-seconds: 604800
  storage:
    endpoint: http://localhost:9000
    bucket: petpal
    access-key: minioadmin
    secret-key: minioadmin
